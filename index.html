<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AO3 读后感</title>
  <link rel="stylesheet" href="styles.css?v=20260711-9">
</head>
<body>
  <div id="app">

    <!-- ========== 顶部导航栏 ========== -->
    <header id="app-header">
      <button id="btn-back" class="icon-btn" aria-label="返回">←</button>
      <div class="header-copy">
        <h1 id="header-title">我的阅读手账</h1>
        <p id="header-subtitle">AO3 · 私人收藏</p>
      </div>
      <div id="header-actions"></div>
    </header>

    <!-- ========== 登录页 ========== -->
    <main id="login-view" class="view login-view" style="display:none">
      <section class="login-card">
        <div class="login-icon">📖</div>
        <h2>登录我的书架</h2>
        <p>登录后，你的记录会在 Safari、桌面快捷方式和其他设备之间自动同步。</p>
        <label class="form-label" for="login-email">邮箱</label>
        <input type="email" id="login-email" autocomplete="email" placeholder="你的邮箱">
        <label class="form-label" for="login-password">密码</label>
        <input type="password" id="login-password" autocomplete="current-password" placeholder="你的密码">
        <p id="login-status" class="fetch-status" role="status" style="display:none"></p>
        <button id="btn-login" class="btn-primary btn-lg">登录</button>
        <p class="login-hint">首次使用前，请先在 Supabase 中创建唯一的个人账号。</p>
      </section>
    </main>

    <!-- ========== 书架主页 ========== -->
    <main id="bookshelf-view" class="view">

      <!-- 搜索栏 -->
      <div class="search-tools">
        <div class="search-bar">
          <label class="sr-only" for="search-input">搜索书架</label>
          <span class="search-icon" aria-hidden="true">⌕</span>
          <input type="search" id="search-input" placeholder="搜索标题、CP 或读后感" autocomplete="off">
          <button id="btn-search-clear" class="clear-btn" aria-label="清除搜索" style="display:none">✕</button>
        </div>
        <button id="btn-filter-toggle" class="filter-toggle" type="button" aria-expanded="false" aria-controls="filter-bar">筛选</button>
      </div>

      <!-- Fandom 书架标签栏 -->
      <div id="fandom-tabs" class="fandom-tabs">
        <button class="fandom-tab active" data-fandom="">📚 全部</button>
      </div>

      <!-- CP 快捷筛选 -->
      <div id="cp-tabs" class="cp-tabs" aria-label="按 CP 快速筛选" style="display:none">
        <button class="cp-tab active" data-cp="all">全部 CP</button>
      </div>

      <!-- 筛选栏 -->
      <div id="filter-bar" class="filter-bar">
        <select id="filter-rating" class="filter-select" aria-label="按喜欢程度筛选">
          <option value="all">全部喜欢程度</option>
          <option value="5">♥ 5颗心</option>
          <option value="4">♥ 4颗心</option>
          <option value="3">♥ 3颗心</option>
          <option value="2">♥ 2颗心</option>
          <option value="1">♥ 1颗心</option>
          <option value="0">未标记</option>
        </select>
        <select id="filter-status" class="filter-select" aria-label="按完结状态筛选">
          <option value="all">全部状态</option>
          <option value="已完结">已完结</option>
          <option value="连载中">连载中</option>
          <option value="一发完">一发完</option>
        </select>
        <select id="filter-cp" class="filter-select" aria-label="按 CP 筛选">
          <option value="all">全部 CP</option>
        </select>
        <select id="sort-by" class="filter-select" aria-label="排序方式">
          <option value="date-desc">按阅读日期 ↓</option>
          <option value="date-asc">按阅读日期 ↑</option>
          <option value="rating-desc">按喜欢程度 ↓</option>
          <option value="rating-asc">按喜欢程度 ↑</option>
        </select>
      </div>

      <!-- 活跃的标签筛选 -->
      <div id="active-tag-filters" class="active-tag-filters" style="display:none">
        <span class="filter-label">筛选：</span>
        <div id="active-filter-tags"></div>
        <button id="btn-clear-tag-filter" class="btn-text">清除</button>
      </div>

      <!-- 视图切换 -->
      <div class="view-toggle-bar">
        <span id="result-count">共 0 篇阅读记录</span>
        <div class="view-toggle-actions">
          <button id="btn-export" class="btn-text btn-sm">导出</button>
          <button id="btn-import" class="btn-text btn-sm">导入</button>
          <input type="file" id="input-import-file" accept=".json" style="display:none">
          <div class="view-toggle">
            <button id="btn-view-card" class="toggle-btn active" aria-label="卡片视图">▦</button>
            <button id="btn-view-list" class="toggle-btn" aria-label="列表视图">☰</button>
          </div>
        </div>
      </div>

      <!-- 卡片/列表容器 -->
      <div id="books-container" class="books-container card-view">
        <!-- 动态填充 -->
      </div>

      <!-- 浮动添加按钮 -->
      <button id="btn-add" class="fab" aria-label="添加记录"><span aria-hidden="true">＋</span> 记一篇</button>
    </main>

    <!-- ========== 添加/编辑页 ========== -->
    <main id="form-view" class="view" style="display:none">

      <!-- AO3 链接自动获取区 -->
      <section class="form-section">
        <label class="form-label">AO3 链接</label>
        <div class="url-input-row">
          <input type="url" id="input-ao3-url" placeholder="粘贴 AO3 作品链接..." autocomplete="off">
          <button id="btn-auto-fetch" class="btn-primary btn-sm">自动获取</button>
        </div>
        <p id="fetch-status" class="fetch-status" style="display:none"></p>
      </section>

      <!-- 截图上传区（链接获取失败后显示） -->
      <section id="ocr-section" class="form-section" style="display:none">
        <label class="form-label">截图识别</label>
        <p class="form-help">可逐张添加，最多 3 张；添加完成后再开始识别</p>
        <div class="ocr-area">
          <input type="file" id="input-screenshot" accept="image/*" multiple style="display:none">
          <div class="ocr-controls">
            <label class="sr-only" for="ocr-language">识别语言</label>
            <select id="ocr-language" aria-label="截图识别语言">
              <option value="chi_sim+eng">中英混合（推荐）</option>
              <option value="eng">仅英文</option>
            </select>
            <div class="ocr-actions">
              <button id="btn-upload-screenshot" class="btn-outline btn-sm">📷 添加截图</button>
              <button id="btn-start-ocr" class="btn-primary btn-sm" style="display:none">开始识别</button>
            </div>
          </div>
          <div id="ocr-preview" class="ocr-preview-grid" style="display:none"></div>
          <div id="ocr-progress" class="ocr-progress" style="display:none">
            <progress id="ocr-progress-bar" value="0" max="100"></progress>
            <span id="ocr-progress-text">正在识别...</span>
          </div>
        </div>
      </section>

      <!-- 基本信息 -->
      <section class="form-section">
        <label class="form-label" for="input-title">标题 <span class="required">*</span></label>
        <input type="text" id="input-title" placeholder="文章标题" required>

        <label class="form-label" for="input-author">作者 <span class="required">*</span></label>
        <input type="text" id="input-author" placeholder="作者名">

        <label class="form-label" for="input-fandom">Fandom / 原作</label>
        <input type="text" id="input-fandom" placeholder="所属 Fandom">

        <label class="form-label" for="input-cp">CP</label>
        <input type="text" id="input-cp" placeholder="例如：角色A/角色B">
      </section>

      <!-- 字数 & 完结状态 -->
      <section class="form-section form-row">
        <div class="form-col">
          <label class="form-label" for="input-wordcount">字数</label>
          <input type="text" id="input-wordcount" placeholder="例如：3.5w">
        </div>
        <div class="form-col">
          <label class="form-label" for="input-status">完结状态</label>
          <select id="input-status">
            <option value="">请选择</option>
            <option value="连载中">连载中</option>
            <option value="已完结">已完结</option>
            <option value="一发完">一发完</option>
          </select>
        </div>
      </section>

      <!-- 门牌号 -->
      <section class="form-section">
        <label class="form-label" for="input-workid">门牌号</label>
        <input type="text" id="input-workid" inputmode="numeric" placeholder="AO3 作品数字 ID，可自动获取或手动填写">
      </section>

      <!-- 文章简介 -->
      <section class="form-section">
        <label class="form-label" for="input-summary">文章简介</label>
        <textarea id="input-summary" rows="4" placeholder="AO3 Summary 会自动填写，也可以手动补充..."></textarea>
      </section>

      <!-- 喜欢程度 -->
      <section class="form-section">
        <label class="form-label">喜欢程度</label>
        <p class="form-help">用心的数量，记下这篇作品打动你的程度</p>
        <div id="star-rating" class="star-rating">
          <button type="button" class="star" data-rating="1" aria-label="1 颗心">♡</button>
          <button type="button" class="star" data-rating="2" aria-label="2 颗心">♡</button>
          <button type="button" class="star" data-rating="3" aria-label="3 颗心">♡</button>
          <button type="button" class="star" data-rating="4" aria-label="4 颗心">♡</button>
          <button type="button" class="star" data-rating="5" aria-label="5 颗心">♡</button>
        </div>
      </section>

      <!-- AO3 原生 Tag -->
      <section class="form-section">
        <label class="form-label">AO3 原生 Tag</label>
        <div class="tag-input-wrap">
          <div id="ao3-tags-container" class="tags-container"></div>
          <input type="text" id="input-ao3-tag" placeholder="输入后按回车添加..." class="tag-input">
        </div>
      </section>

      <!-- 私人 Tag -->
      <section class="form-section">
        <label class="form-label">私人 Tag</label>
        <div class="preset-tags" id="preset-tags">
          <button class="preset-tag" data-tag="甜文">甜文</button>
          <button class="preset-tag" data-tag="虐心">虐心</button>
          <button class="preset-tag" data-tag="酸涩">酸涩</button>
          <button class="preset-tag" data-tag="HE">HE</button>
          <button class="preset-tag" data-tag="BE">BE</button>
          <button class="preset-tag" data-tag="慢热">慢热</button>
          <button class="preset-tag" data-tag="神作">神作</button>
          <button class="preset-tag" data-tag="文笔好">文笔好</button>
          <button class="preset-tag" data-tag="设定绝">设定绝</button>
          <button class="preset-tag" data-tag="好车">好车</button>
        </div>
        <div class="tag-input-wrap">
          <div id="private-tags-container" class="tags-container"></div>
          <input type="text" id="input-private-tag" placeholder="输入自定义标签，回车添加..." class="tag-input">
        </div>
      </section>

      <!-- 阅读日期 -->
      <section class="form-section">
        <label class="form-label" for="input-date">阅读日期</label>
        <input type="date" id="input-date">
      </section>

      <!-- 读后感 -->
      <section class="form-section">
        <label class="form-label" for="input-notes">读后感</label>
        <textarea id="input-notes" rows="6" placeholder="在这里写下你的读后感..."></textarea>
      </section>

      <!-- 保存按钮 -->
      <div class="form-actions">
        <button id="btn-save" class="btn-primary btn-lg">保存</button>
        <button id="btn-cancel-form" class="btn-text">取消</button>
      </div>
    </main>

    <!-- ========== 详情页 ========== -->
    <main id="detail-view" class="view" style="display:none">
      <div id="detail-content" class="detail-content">
        <!-- 动态填充 -->
      </div>
      <div class="detail-actions">
        <button id="btn-edit" class="btn-primary">编辑</button>
        <button id="btn-delete" class="btn-danger">删除</button>
      </div>
    </main>

    <!-- ========== 删除确认弹窗 ========== -->
    <div id="confirm-dialog" class="dialog-overlay" style="display:none">
      <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="delete-dialog-title">
        <p id="delete-dialog-title">确定要删除这条记录吗？</p>
        <p class="dialog-warning">删除后无法恢复</p>
        <div class="dialog-actions">
          <button id="btn-confirm-delete" class="btn-danger">确认删除</button>
          <button id="btn-cancel-delete" class="btn-text">取消</button>
        </div>
      </div>
    </div>

    <!-- ========== OCR 结果确认 ========== -->
    <div id="ocr-review-dialog" class="dialog-overlay ocr-review-dialog" style="display:none">
      <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="ocr-review-title">
        <h2 id="ocr-review-title">核对识别结果</h2>
        <p class="dialog-warning">只会提取明确的 AO3 标签区块；请核对后再填入表单</p>
        <label class="form-label" for="ocr-review-title-input">标题</label>
        <input id="ocr-review-title-input" type="text">
        <label class="form-label" for="ocr-review-author">作者</label>
        <input id="ocr-review-author" type="text">
        <label class="form-label" for="ocr-review-fandom">Fandom / 原作</label>
        <input id="ocr-review-fandom" type="text">
        <label class="form-label" for="ocr-review-cp">CP</label>
        <input id="ocr-review-cp" type="text">
        <label class="form-label" for="ocr-review-wordcount">字数</label>
        <input id="ocr-review-wordcount" type="text">
        <label class="form-label" for="ocr-review-status">完结状态</label>
        <select id="ocr-review-status">
          <option value="">未识别</option>
          <option value="连载中">连载中</option>
          <option value="已完结">已完结</option>
          <option value="一发完">一发完</option>
        </select>
        <label class="form-label" for="ocr-review-summary">文章简介</label>
        <textarea id="ocr-review-summary" rows="6"></textarea>
        <label class="form-label" for="ocr-review-tags">AO3 标签（每行一个）</label>
        <textarea id="ocr-review-tags" rows="5"></textarea>
        <div class="dialog-actions">
          <button id="btn-apply-ocr" class="btn-primary">填入表单</button>
          <button id="btn-cancel-ocr" class="btn-text">取消</button>
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js?v=20260712-1"></script>
</body>
</html>
